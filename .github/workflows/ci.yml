name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    name: backend tests (race)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: backend/go.sum

      - name: Vet
        run: go vet ./...

      - name: Test (race)
        run: |
          set -o pipefail
          go test -race -v ./... | tee /tmp/test.log

      - name: Report
        if: always()
        run: |
          {
            echo '### Backend tests (`go test -race`)'
            echo '```'
            grep -E '^(=== RUN|--- (PASS|FAIL):|PASS|FAIL|ok )' /tmp/test.log || cat /tmp/test.log
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
