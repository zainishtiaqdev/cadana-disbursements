# Fly.io config. Deploy: cd backend && fly deploy  (Fly builds the Dockerfile remotely).
# `fly launch` will confirm/adjust the app name (must be globally unique) and region.
app = "cadana-disbursements-api"
primary_region = "iad" # change to your nearest: lhr, fra, ams, sin, syd, …

[build]

[env]
  PORT = "8080"
  ALLOWED_ORIGIN = "*"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    method = "GET"
    path = "/healthz"
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
